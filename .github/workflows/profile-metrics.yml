name: Metrics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/profile-metrics.yml'
  schedule:
    - cron: '0 14 * * *'

concurrency: profile-metrics

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: left profile
        uses: stalomeow/metrics@projects-v2
        with:
          token: ${{ secrets.PROFILE_METRICS_TOKEN }}
          committer_token: ${{ github.token }}
          filename: github-metrics-left.svg

          user: JaydipGabani
          template: classic
          base: header, activity, community
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          plugin_languages_indepth: no
          config_padding: 0, 8 + 11%
          config_order: base.header, base.activity+community, languages

      - name: right profile
        uses: stalomeow/metrics@projects-v2
        with:
          token: ${{ secrets.PROFILE_METRICS_TOKEN }}
          committer_token: ${{ github.token }}
          filename: github-metrics-right.svg

          user: JaydipGabani
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_achievements: yes
          plugin_achievements_threshold: X
          plugin_achievements_limit: 8
          plugin_achievements_display: detailed
          config_padding: 0, 8 + 11%
          config_order: achievements
